  :root{
    --page:#121215; --card:#1c1c21; --accent:#d96a41; --accent-d:#c25a36;
    --banner:#b06a4a; --muted:#a09da6; --border:#33333c; --ink:#e9e7e2;
    --panel-top:#2c2c2c; --panel-bot:#0a0a0a; --panel-line:#1c1c1c;
    --led-amber:#ff9e3d; --led-amber-off:#3a230a;
    --sans:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
    /* positiekleuren op lichte achtergrond */
    --p-dialup:#f0a03a; --p-dialdown:#cf7f35; --p-crownup:#35c2b1; --p-crowndown:#5b93cf;
    --p-crownleft:#a98bd4; --p-crownright:#e0678a; --p-worn:#63c063; --p-flat:#8a8a8a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--page);color:var(--ink);font-family:var(--sans);min-height:100vh;padding:28px 16px 64px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto}
  .card{background:var(--card);border-radius:16px;padding:30px 34px 34px;box-shadow:0 10px 40px rgba(0,0,0,.45)}
  @media (max-width:560px){.card{padding:22px 18px 26px}}

  /* header */
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  h1{color:var(--accent);font-size:clamp(20px,3.2vw,30px);font-weight:800;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14px;margin:0}
  .head-tools{display:flex;align-items:center;gap:10px;flex:0 0 auto}
  .qbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:#26262c;color:var(--muted);
    font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qbtn:hover{color:var(--accent);border-color:var(--accent)}
  .lang{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:#26262c}
  .lang button{border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:700;
    padding:7px 13px;cursor:pointer}
  .lang button.on{background:var(--accent);color:#fff}

  /* guide */
  .guide{margin-top:20px;border:1px solid #45332a;background:#241d1a;border-radius:12px;padding:18px 20px;position:relative}
  .guide h2{margin:0 0 10px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-d)}
  .guide ol{margin:0;padding-left:0;list-style:none;counter-reset:g}
  .guide li{counter-increment:g;position:relative;padding:5px 0 5px 34px;font-size:14px;color:var(--ink)}
  .guide li::before{content:counter(g);position:absolute;left:0;top:4px;width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .guide .note{margin:12px 0 0;font-size:13px;color:#eda57f;background:#2e221c;
    border-left:3px solid var(--accent);padding:9px 12px;border-radius:0 8px 8px 0}
  .guide .gx{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;border:0;background:none}
  .guide .gx:hover{color:var(--accent)}

  /* dropzone */
  .drop{margin-top:20px;border:1.5px dashed var(--border);border-radius:12px;background:#1f1f25;padding:26px 22px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
  .drop:hover,.drop.hot{border-color:var(--accent);background:rgba(217,106,65,.08)}
  .drop .big{font-size:15px;color:var(--ink)}
  .drop .small{font-size:13px;color:var(--muted);margin-top:5px}
  .drop .pills{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .pillbtn{border:1px solid var(--border);background:var(--card);border-radius:999px;padding:7px 16px;font-size:13px;color:var(--ink);cursor:pointer}
  .pillbtn:hover{border-color:var(--accent);color:var(--accent)}
  .pillbtn.solid{background:var(--accent);border-color:var(--accent);color:#fff}
  .pillbtn.solid:hover{background:var(--accent-d);color:#fff}

  /* controls */
  .bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:22px;padding:12px 16px;background:#1f1f25;border:1px solid var(--border);border-radius:12px}
  .grp{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted)}
  select{font:inherit;font-size:13px;background:var(--card);color:var(--ink);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
  .switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;color:var(--ink)}
  .switch input{display:none}
  .track{width:38px;height:22px;border-radius:999px;background:#34343c;border:1px solid var(--border);position:relative;transition:background .15s}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#8f8c96;transition:transform .15s,background .15s}
  .switch input:checked + .track{background:var(--banner);border-color:var(--accent)}
  .switch input:checked + .track::after{transform:translateX(16px);background:#fff}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .fchip{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:4px 10px;display:inline-flex;align-items:center;gap:8px}
  .fchip b{color:var(--ink);font-weight:600}
  .fchip .x{cursor:pointer;color:#777}
  .fchip .x:hover{color:var(--accent)}

  .summary{font-size:12.5px;color:var(--muted);margin:16px 2px 4px}

  /* watch cards (stacked) */
  .list{margin-top:14px;display:flex;flex-direction:column;gap:16px}
  .wcard{border:1px solid var(--border);border-radius:14px;padding:18px 20px 16px;background:#202026}
  .wcard.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(217,106,65,.3)}
  .tgsec{margin-top:14px;border-top:1px dashed var(--border);padding-top:10px}
  .tghead{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:6px}
  .pos.tg th,.pos.tg td{padding-right:18px}
  .pos.tg th:last-child,.pos.tg td:last-child{padding-right:0}
  .pos.tg td:first-child{white-space:nowrap;color:var(--muted)}
  .pos.tg .tgreads{font-size:12.5px;line-height:1.9}
  .pos.tg .tgreads i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:0}
  .tgnote{color:var(--muted);font-style:italic}
  .tgdelta b{color:var(--accent)}
  .wtop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .wname{font-size:17px;font-weight:700;color:var(--ink)}
  .wmeta{font-size:12px;color:var(--muted);margin-top:3px}
  .actchip{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:3px 10px;background:var(--accent);color:#fff;white-space:nowrap}

  .ledrow{display:flex;flex-wrap:wrap;gap:12px;align-items:stretch;margin:14px 0 4px}
  .ledwrap{background:linear-gradient(180deg,var(--panel-top),var(--panel-bot));border:1px solid var(--panel-line);border-radius:12px;padding:11px 18px;flex:1 1 200px;min-width:190px}
  .led-label{font-size:10.5px;letter-spacing:2px;color:#8a8a8a;text-transform:uppercase;margin-bottom:7px}
  .led{display:flex;align-items:center;gap:.45ch}
  .led-sign{font-family:var(--mono);font-weight:800;font-size:24px;color:var(--led-amber);text-shadow:0 0 7px rgba(255,158,61,.55)}
  .led-seg{position:relative;display:inline-block}

<script>
"use strict";
const MS_PER_DAY=86400000, SPEC_BAND=5;

/* ---------- i18n ---------- */
const T={
  en:{
    sub:"Read your JSON backups and review the rate per watch — The Sioux Watch Café",
    qtitle:"How it works", gxtitle:"Close",
    dBig:"Drop one or more .json backups here",
    dSmall:"or click to choose — everything stays local in your browser, nothing is uploaded",
    pick:"Choose file", sample:"Show example",
    merge:"Merge watches", mergeTip:"Combine watches with the same id/name across different files",
    sort:"Sort", sName:"by name", sRate:"largest deviation first", sCount:"most measurements", sRecent:"most recent",
    rate:"Rate", sday:"s/day", noRate:"too few measurements for a rate",
    posHead:"Position", n:"n", spread:"Spread between positions",
    active:"active", unnamed:"Unnamed watch", noValid:"no valid measurements", remove:"Remove",
    files:f=>f+(f===1?" file":" files"),
    watches:w=>w+(w===1?" watch":" watches"),
    meas:m=>m+(m===1?" measurement":" measurements"),
    empty:"No watches found in the loaded backup(s).",
    foot:"Watch Rate Meter · viewer · rate via linear regression (s/day)",
    gTitle:"How it works",
    gSteps:[
      "Open a backup — drag your .json backup file(s) onto the page, or click to choose.",
      "Load several files at once to compare a watch across different points in time.",
      "Turn on \u201CMerge watches\u201D to combine the same watch from different files into one.",
      "Read the rate in s/day, the offset trace over time, and the breakdown per position."
    ],
    gNote:"A watch needs at least two measurements at different times before a rate (s/day) can be calculated."
  },
  nl:{
    sub:"Lees je JSON-backups en bekijk de gang per horloge — The Sioux Watch Café",
    qtitle:"Zo werkt het", gxtitle:"Sluiten",
    dBig:"Sleep een of meer .json-backups hierheen",
    dSmall:"of klik om te kiezen — alles blijft lokaal in je browser, er wordt niets verstuurd",
    pick:"Bestand kiezen", sample:"Toon voorbeeld",
    merge:"Horloges samenvoegen", mergeTip:"Voeg horloges met hetzelfde id/naam uit verschillende bestanden samen",
    sort:"Sorteer", sName:"op naam", sRate:"grootste afwijking eerst", sCount:"meeste metingen", sRecent:"recentst gemeten",
    rate:"Gang", sday:"s/dag", noRate:"te weinig metingen voor een gang",
    posHead:"Positie", n:"n", spread:"Spreiding tussen posities",
    active:"actief", unnamed:"Naamloos horloge", noValid:"geen geldige metingen", remove:"Verwijderen",
    files:f=>f+(f===1?" bestand":" bestanden"),
    watches:w=>w+(w===1?" horloge":" horloges"),
    meas:m=>m+(m===1?" meting":" metingen"),
    empty:"Geen horloges gevonden in de geladen backup(s).",
    foot:"Watch Rate Meter · viewer · gang via lineaire regressie (s/dag)",
    gTitle:"Zo werkt het",
    gSteps:[
      "Open een backup — sleep je .json-backup(s) op de pagina, of klik om te kiezen.",
      "Laad meerdere bestanden tegelijk om een horloge over verschillende momenten te vergelijken.",
      "Zet \u201CHorloges samenvoegen\u201D aan om hetzelfde horloge uit verschillende bestanden samen te voegen.",
      "Lees de gang in s/dag, de offset-trace over tijd, en de uitsplitsing per positie."
    ],
    gNote:"Een horloge heeft minstens twee metingen op verschillende momenten nodig voordat een gang (s/dag) berekend kan worden."
  }
};
const POS={
  dial_up:{en:"Dial up",nl:"Wijzerplaat boven",color:"var(--p-dialup)"},
  dial_down:{en:"Dial down",nl:"Wijzerplaat onder",color:"var(--p-dialdown)"},
  crown_up:{en:"Crown up",nl:"Kroon boven",color:"var(--p-crownup)"},
  crown_down:{en:"Crown down",nl:"Kroon onder",color:"var(--p-crowndown)"},
  crown_left:{en:"Crown left",nl:"Kroon links",color:"var(--p-crownleft)"},
  crown_right:{en:"Crown right",nl:"Kroon rechts",color:"var(--p-crownright)"},
  worn:{en:"Worn",nl:"Gedragen",color:"var(--p-worn)"},
  flat:{en:"Flat",nl:"Plat / liggend",color:"var(--p-flat)"}
};
const FALLBACK=["#f0a03a","#35c2b1","#5b93cf","#a98bd4","#e0678a","#63c063","#cf7f35","#8a8a8a"];
function posInfo(code,idx){
  if(POS[code]) return {label:POS[code][lang],abbr:abbrOf(code),color:POS[code].color};
  const pretty=String(code||"?").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  return {label:pretty,abbr:(code||"?").slice(0,2).toUpperCase(),color:FALLBACK[idx%FALLBACK.length]};
}
function abbrOf(code){return ({dial_up:"DU",dial_down:"DD",crown_up:"CU",crown_down:"CD",crown_left:"CL",crown_right:"CR",worn:"WR",flat:"FL"})[code]||(code||"?").slice(0,2).toUpperCase();}

/* ---------- state ---------- */
let FILES=[], merge=false, sortBy="name", lang="nl", guideOpen=false;

/* ---------- math ---------- */
function linreg(pts){
  const n=pts.length; if(n<2) return null;
  const x0=pts[0].x; let sx=0,sy=0,sxx=0,sxy=0,syy=0;
  for(const p of pts){const x=p.x-x0,y=p.y;sx+=x;sy+=y;sxx+=x*x;sxy+=x*y;syy+=y*y;}
  const denom=n*sxx-sx*sx; if(denom===0) return null;
  const slope=(n*sxy-sx*sy)/denom, intercept=(sy-slope*sx)/n;
  const ssTot=syy-sy*sy/n; let ssRes=0;
  for(const p of pts){const fit=intercept+slope*(p.x-x0);ssRes+=(p.y-fit)**2;}
  const r2=ssTot>0?1-ssRes/ssTot:null;
  return {ratePerDay:slope*MS_PER_DAY,slope,intercept,x0,r2,n};
}
function normMeas(m){return {id:m.id,t:Number(m.t),offset:Number(m.offset),position:m.position||"unknown",note:m.note||"",newStart:!!m.newStart};}
function normTG(sess){
  const readings=(sess.readings||[]).map(r=>({position:r.position||"unknown",rate:Number(r.rate),
    amplitude:(r.amplitude!=null&&isFinite(r.amplitude))?Number(r.amplitude):null,
    beatError:(r.beatError!=null&&isFinite(r.beatError))?Number(r.beatError):null}))
    .filter(r=>Number.isFinite(r.rate));
  return {id:sess.id,t:Number(sess.t),note:sess.note||"",readings};
}

function collectWatches(){
  const out=[];
  if(merge){
    const byKey=new Map();
    for(const f of FILES) for(const w of f.watches){
      const key=(w.id!=null?"id:"+w.id:"name:"+(w.name||"")).toLowerCase();
      if(!byKey.has(key)) byKey.set(key,{id:w.id,name:w.name,sources:new Set(),measById:new Map(),tgById:new Map(),active:false});
      const agg=byKey.get(key); agg.sources.add(f.name);
      if(f.activeWatch!=null && String(f.activeWatch)===String(w.id)) agg.active=true;
      (w.measurements||[]).forEach((m,i)=>{
        const nm=normMeas(m);
        const mk=nm.id!=null?"id:"+nm.id:("t:"+nm.t+"|o:"+nm.offset+"|i:"+i+"|"+f.name);
        if(!agg.measById.has(mk)) agg.measById.set(mk,nm);
      });
      (w.timegrapher||[]).forEach((sess,i)=>{
        const ns=normTG(sess);
        const tk=ns.id!=null?"id:"+ns.id:("t:"+ns.t+"|i:"+i+"|"+f.name);
        if(!agg.tgById.has(tk)) agg.tgById.set(tk,ns);
      });
    }
    for(const a of byKey.values()) out.push({id:a.id,name:a.name,sources:[...a.sources],active:a.active,measurements:[...a.measById.values()],timegrapher:[...a.tgById.values()]});
  } else {
    for(const f of FILES) for(const w of f.watches) out.push({
      id:w.id,name:w.name,sources:[f.name],
      active:f.activeWatch!=null && String(f.activeWatch)===String(w.id),
      measurements:(w.measurements||[]).map(normMeas),
      timegrapher:(w.timegrapher||[]).map(normTG)
    });
  }
  for(const w of out){
    w.measurements.sort((a,b)=>a.t-b.t);
    const valid=w.measurements.filter(m=>Number.isFinite(m.t)&&Number.isFinite(m.offset));
    w.valid=valid;
    let si=0; valid.forEach((m,i)=>{if(m.newStart)si=i;});
    const fitPts=valid.slice(si);
    w.fit=linreg(fitPts.map(m=>({x:m.t,y:m.offset})));
    w.fitStart=fitPts.length?fitPts[0].t:null;
    w.hasReset=si>0;
    w.tMin=valid.length?valid[0].t:null; w.tMax=valid.length?valid[valid.length-1].t:null;
    const groups=new Map();
    fitPts.forEach(m=>{if(!groups.has(m.position))groups.set(m.position,[]);groups.get(m.position).push(m);});
    let pi=0; const positions=[];
    for(const [code,arr] of groups){
      const info=posInfo(code,pi++); const f=linreg(arr.map(m=>({x:m.t,y:m.offset})));
      positions.push({code,info,n:arr.length,ratePerDay:f?f.ratePerDay:null});
    }
    positions.sort((a,b)=>(b.ratePerDay??-1e9)-(a.ratePerDay??-1e9));
    w.positions=positions;
    const rated=positions.filter(p=>p.ratePerDay!=null).map(p=>p.ratePerDay);
    w.delta=rated.length>=2?Math.max(...rated)-Math.min(...rated):null;
    w.timegrapher=(w.timegrapher||[]).filter(sess=>Number.isFinite(sess.t)&&sess.readings.length).sort((a,b)=>a.t-b.t);
    w.timegrapher.forEach(sess=>{sess.avg=sess.readings.reduce((a,r)=>a+r.rate,0)/sess.readings.length;});
  }
  return out;
}

/* ---------- format ---------- */
function fmtMag(r){return Math.abs(r).toFixed(1);}
function signOf(r){return r>=0?"+":"\u2212";}
function fmtDate(t){return new Date(t).toLocaleDateString(lang==="nl"?"nl-NL":"en-GB",{day:"2-digit",month:"short",year:"2-digit"});}
function fmtDateTime(t){return new Date(t).toLocaleString(lang==="nl"?"nl-NL":"en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- chart ---------- */
function chartSVG(w){
  const W=560,H=200,padL=44,padR=14,padT=12,padB=26;
  const pts=w.valid; if(!pts.length) return "";
  let tMin=w.tMin,tMax=w.tMax; if(tMin===tMax){tMin-=MS_PER_DAY/2;tMax+=MS_PER_DAY/2;}
  let oMin=Math.min(...pts.map(p=>p.offset)),oMax=Math.max(...pts.map(p=>p.offset));
  if(oMin===oMax){oMin-=1;oMax+=1;} const op=(oMax-oMin)*0.12; oMin-=op; oMax+=op;
  const X=t=>padL+(t-tMin)/(tMax-tMin)*(W-padL-padR), Y=o=>H-padB-(o-oMin)/(oMax-oMin)*(H-padT-padB);
  const uniq=[...new Set(pts.map(q=>q.position))];
  let g="";
  for(let i=0;i<=4;i++){const o=oMin+(oMax-oMin)*i/4,y=Y(o);
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#2e2e36" stroke-width="1"/>`;
    g+=`<text x="${padL-7}" y="${(y+3).toFixed(1)}" fill="#8f8c96" font-size="10" text-anchor="end" font-family="${'ui-monospace,monospace'}">${o.toFixed(0)}</text>`;}
  for(let i=0;i<=3;i++){const t=tMin+(tMax-tMin)*i/3,x=X(t);
    g+=`<text x="${x.toFixed(1)}" y="${H-8}" fill="#8f8c96" font-size="10" text-anchor="${i===0?'start':i===3?'end':'middle'}" font-family="${'ui-monospace,monospace'}">${fmtDate(t)}</text>`;}
  if(w.fit){const yAt=t=>w.fit.intercept+w.fit.slope*(t-w.fit.x0);
    const fs=Math.max(tMin, w.fitStart??tMin);
    g+=`<line x1="${X(fs).toFixed(1)}" y1="${Y(yAt(fs)).toFixed(1)}" x2="${X(tMax).toFixed(1)}" y2="${Y(yAt(tMax)).toFixed(1)}" stroke="var(--accent)" stroke-width="2" opacity=".9"/>`;}
  pts.forEach(p=>{const info=posInfo(p.position,uniq.indexOf(p.position));
    const title=`${fmtDateTime(p.t)} \u00B7 ${p.offset.toFixed(1)}s \u00B7 ${info.label}${p.note?` \u00B7 ${p.note}`:""}`;
    g+=`<circle cx="${X(p.t).toFixed(1)}" cy="${Y(p.offset).toFixed(1)}" r="${p.newStart?4:3.4}" fill="${info.color}" stroke="${p.newStart?'var(--accent)':'#202026'}" stroke-width="${p.newStart?1.6:1}"><title>${esc(title)}</title></circle>`;});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="offset / time">${g}</svg>`;
}

/* ---------- render ---------- */
function ledHTML(r){
  if(r==null) return `<div class="ledwrap"><div class="led-label">${t().rate}</div><div class="led-none">${t().noRate}</div></div>`;
  const mag=fmtMag(r), ghost=mag.replace(/\d/g,"8");
  return `<div class="ledwrap"><div class="led-label">${t().rate}</div>
    <div class="led"><span class="led-sign">${signOf(r)}</span>
      <span class="led-seg"><span class="led-ghost">${ghost}</span><span class="led-lit">${mag}</span></span>
      <span class="led-unit">${t().sday}</span></div></div>`;
}
function cardHTML(w){
  const r=w.fit?.ratePerDay ?? null;
  const range=w.tMin!=null?`${fmtDate(w.tMin)} – ${fmtDate(w.tMax)}`:t().noValid;
  const src=w.sources.length>1?` · ${t().files(w.sources.length)}`:"";
  const legend=w.positions.map(p=>`<span><i style="background:${p.info.color}"></i>${p.info.abbr}</span>`).join("");
  const rows=w.positions.map(p=>`<tr><td class="dot"><i style="background:${p.info.color}"></i></td>
    <td>${esc(p.info.label)}</td><td class="num">${p.n}</td>
    <td class="num">${p.ratePerDay==null?"—":signOf(p.ratePerDay)+fmtMag(p.ratePerDay)}</td></tr>`).join("");
  return `<div class="wcard ${w.active?'active':''}">
    <div class="wtop">
      <div><div class="wname">${esc(w.name||t().unnamed)}</div>
        <div class="wmeta">${esc(String(w.id??"—"))} · ${t().meas(w.valid.length)} · ${range}${src}</div></div>
      ${w.active?`<span class="actchip">${t().active}</span>`:""}
    </div>
    <div class="ledrow">${ledHTML(r)}</div>
    ${chartSVG(w)}
    <div class="legend">${legend}</div>
    ${w.positions.length?`<table class="pos"><thead><tr><th class="dot"></th><th>${t().posHead}</th><th class="num">${t().n}</th><th class="num">${t().sday}</th></tr></thead><tbody>${rows}</tbody></table>`:""}
    ${w.delta!=null?`<div class="delta"><span>${t().spread}</span><b>${w.delta.toFixed(1)} ${t().sday}</b></div>`:""}
    ${tgHTML(w)}
  </div>`;
}

function tgHTML(w){
  const tg=w.timegrapher||[];
  if(!tg.length) return "";
  const last=tg[tg.length-1];
  const wr=w.fit?.ratePerDay ?? null;
  let cmp="";
  if(wr!=null){
    const d=wr-last.avg;
    cmp=`<div class="delta tgdelta"><span>${t().tgVs}</span><b>TG ${signOf(last.avg)}${fmtMag(last.avg)} \u00b7 ${t().tgWorn} ${signOf(wr)}${fmtMag(wr)} \u00b7 \u0394 ${signOf(d)}${fmtMag(d)} ${t().sday}</b></div>`;
  }
  const rows=tg.slice().reverse().map(sess=>{
    const reads=sess.readings.map((r,i)=>{
      const info=posInfo(r.position,i);
      const extra=[r.amplitude!=null?r.amplitude+"\u00b0":null,r.beatError!=null?r.beatError+" ms":null].filter(Boolean).join(" \u00b7 ");
      return `<span title="${esc(info.label+(extra?" \u00b7 "+extra:""))}" style="white-space:nowrap"><i style="background:${info.color}"></i>${info.abbr} ${signOf(r.rate)}${Math.abs(r.rate)}</span>`;
    }).join(" \u00b7 ");
    return `<tr><td>${fmtDate(sess.t)}</td><td class="num">${signOf(sess.avg)}${fmtMag(sess.avg)}</td><td class="tgreads">${reads}${sess.note?` <span class="tgnote">\u2014 ${esc(sess.note)}</span>`:""}</td></tr>`;
  }).join("");
  return `<div class="tgsec"><div class="tghead">${t().tgHead}</div>
    <table class="pos tg"><thead><tr><th>${t().tgDate}</th><th class="num">${t().tgAvg}</th><th>${t().tgReadings}</th></tr></thead><tbody>${rows}</tbody></table>
    ${cmp}</div>`;
}

T.en.tgHead="Timegrapher"; T.nl.tgHead="Timegrapher";
T.en.tgDate="date"; T.nl.tgDate="datum";
T.en.tgAvg="avg"; T.nl.tgAvg="gem.";
T.en.tgReadings="readings"; T.nl.tgReadings="metingen";
T.en.tgVs="machine vs worn"; T.nl.tgVs="machine vs gedragen";
T.en.tgWorn="worn"; T.nl.tgWorn="pols";

function t(){return T[lang];}

function applyChrome(){
  document.documentElement.lang=lang;
  document.getElementById("t-sub").textContent=t().sub;
  document.getElementById("qbtn").title=t().qtitle;
  document.getElementById("gx").title=t().gxtitle;
  document.getElementById("g-title").textContent=t().gTitle;
  document.getElementById("g-steps").innerHTML=t().gSteps.map(s=>`<li>${esc(s)}</li>`).join("");
  document.getElementById("g-note").textContent=t().gNote;
  document.getElementById("d-big").textContent=t().dBig;
  document.getElementById("d-small").textContent=t().dSmall;
  document.getElementById("pickBtn").textContent=t().pick;
  document.getElementById("sampleBtn").textContent=t().sample;
  document.getElementById("t-merge").textContent=t().merge;
  document.getElementById("mergeLbl").title=t().mergeTip;
  document.getElementById("t-sort").textContent=t().sort;
  const so=document.getElementById("sort").options;
  so[0].textContent=t().sName; so[1].textContent=t().sRate; so[2].textContent=t().sCount; so[3].textContent=t().sRecent;
  document.getElementById("t-foot").textContent=t().foot;
  document.getElementById("lang-en").classList.toggle("on",lang==="en");
  document.getElementById("lang-nl").classList.toggle("on",lang==="nl");
}

function render(){
  applyChrome();
  const has=FILES.length>0;
  // guide visibility: altijd in lege toestand, anders alleen als geopend
  const showGuide=!has||guideOpen;
  document.getElementById("guide").classList.toggle("hide",!showGuide);
  document.getElementById("gx").classList.toggle("hide",!has); // × alleen als er bestanden zijn
  document.getElementById("bar").classList.toggle("hide",!has);
  document.getElementById("summary").classList.toggle("hide",!has);

  const list=document.getElementById("list");
  if(!has){ list.innerHTML=""; return; }

  const watches=collectWatches();
  const sorters={
    name:(a,b)=>String(a.name||"").localeCompare(String(b.name||""),lang),
    rate:(a,b)=>(Math.abs(b.fit?.ratePerDay??-1e9))-(Math.abs(a.fit?.ratePerDay??-1e9)),
    count:(a,b)=>b.valid.length-a.valid.length,
    recent:(a,b)=>(b.tMax??0)-(a.tMax??0)
  };
  watches.sort(sorters[sortBy]);
  list.innerHTML = watches.length?watches.map(cardHTML).join(""):`<div class="empty">${t().empty}</div>`;

  const totMeas=watches.reduce((s,w)=>s+w.valid.length,0);
  document.getElementById("summary").textContent=`${t().watches(watches.length)} · ${t().meas(totMeas)} · ${t().files(FILES.length)}`;

  document.getElementById("chips").innerHTML=FILES.map((f,i)=>
    `<span class="fchip"><b>${esc(f.name)}</b> ${f.watches.length}♦ <span class="x" data-i="${i}" title="${t().remove}">✕</span></span>`).join("");
  document.querySelectorAll(".fchip .x").forEach(el=>el.onclick=()=>{FILES.splice(+el.dataset.i,1);saveLS();render();});
}

/* ---------- loading ---------- */
function loadJSON(name,text){
  let data; try{data=JSON.parse(text);}catch(e){alert(`"${name}": geen geldige JSON / invalid JSON.`);return;}
  const watches=Array.isArray(data.watches)?data.watches:Array.isArray(data)?data:data.watch?[data.watch]:null;
  if(!watches){alert(`"${name}": geen "watches"-lijst gevonden / no "watches" list.`);return;}
  FILES.push({name,watches,activeWatch:data.activeWatch,rawText:text});
  saveLS();
  guideOpen=false; render();
}
const LSKEY="swcViewerFiles";
function saveLS(){try{localStorage.setItem(LSKEY,JSON.stringify(FILES.map(f=>({name:f.name,text:f.rawText||""}))));}catch(e){}}
function readFiles(list){[...list].forEach(file=>{const r=new FileReader();r.onload=()=>loadJSON(file.name,r.result);r.readAsText(file);});}

/* ---------- events ---------- */
const drop=document.getElementById("drop"),fileInput=document.getElementById("file");
drop.onclick=e=>{if(e.target.id!=="sampleBtn"&&e.target.id!=="pickBtn")fileInput.click();};
document.getElementById("pickBtn").onclick=e=>{e.stopPropagation();fileInput.click();};
fileInput.onchange=()=>{readFiles(fileInput.files);fileInput.value="";};
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
drop.addEventListener("drop",e=>{if(e.dataTransfer?.files?.length)readFiles(e.dataTransfer.files);});
document.getElementById("merge").onchange=e=>{merge=e.target.checked;render();};
document.getElementById("sort").onchange=e=>{sortBy=e.target.value;render();};
document.getElementById("sampleBtn").onclick=e=>{e.stopPropagation();loadJSON("voorbeeld-backup.json",SAMPLE);};
document.getElementById("qbtn").onclick=()=>{guideOpen=true;render();};
document.getElementById("gx").onclick=()=>{guideOpen=false;render();};
document.querySelectorAll(".lang button").forEach(b=>b.onclick=()=>{lang=b.dataset.l;render();});

  {id:"w2",name:"Omega Speedmaster",measurements:mk([[0,0,"dial_up"],[0.8,-1.4,"worn"],[1.7,-3.0,"dial_up"],[2.5,-5.1,"worn"],[3.4,-6.2,"dial_up"],[4.3,-8.0,"worn"],[5.2,-9.4,"dial_up"]])},
  {id:"w3",name:"Vostok Amphibia",measurements:mk([[0,0,"dial_up"],[0.5,9.0,"crown_up"],[1.1,11.8,"dial_up"],[1.9,30.5,"crown_up"],[2.6,33.0,"dial_up"],[3.5,55.0,"crown_up"],[4.2,58.4,"dial_up"]])}
]},null,0);

render();

/* ---------- eerder geladen bestanden herstellen ---------- */
(function(){
  try{
    const raw=localStorage.getItem(LSKEY); if(!raw) return;
    const arr=JSON.parse(raw); if(!Array.isArray(arr)) return;
    const items=arr.filter(f=>f&&f.text);
    FILES.length=0;
    items.forEach(f=>loadJSON(f.name,f.text));
  }catch(e){}
})();
</script>
