<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sioux Watch Café Clock</title>

  <style>
    :root {
      --bg: #121215;
      --card: #1c1c21;
      --accent: #d96a41;
      --text: #e9e7e2;

      --led-on: #ff1b1b;
      --led-glow: rgba(255, 59, 59, 0.85);
      --led-off: #3a0b0b;
      --clock-bg: #151515;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

	.footer {
	  text-align: center;
	  font-size: 0.9em;
	  color: #8f8c96;
	  padding: 10px 0;
	}

    .header {
      text-align: center;
      padding: 50px 20px 30px;
    }

    .header h1 {
      color: var(--accent);
      font-size: 36px;
      margin: 0 0 10px;
    }

    .header p {
      color: #a09da6;
      font-size: 16px;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
    }

    h2 {
      color: var(--accent);
      margin: 0 0 18px;
      font-size: 22px;
    }

    .clock-panel {
      background: linear-gradient(180deg, #1d1d1d 0%, #111 100%);
      border-radius: 18px;
      padding: 28px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: auto;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.04),
        inset 0 -4px 10px rgba(0,0,0,0.45),
        0 8px 18px rgba(0,0,0,0.18);
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
    }

    /* ===== Main time digits ===== */
    .digit {
      position: relative;
      width: 64px;
      height: 116px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }

    .segment {
      position: absolute;
      background: var(--led-off);
      box-shadow: none;
      transition: background 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      opacity: 0.28;
    }

    .segment.on {
      background: var(--led-on);
      opacity: 1;
      box-shadow:
        0 0 8px var(--led-glow),
        0 0 16px var(--led-glow),
        0 0 28px rgba(255, 60, 60, 0.35);
    }

    .a, .d, .g {
      width: 38px;
      height: 10px;
      left: 13px;
      clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
    }

    .a { top: 6px; }
    .g { top: 53px; }
    .d { bottom: 6px; }

    .b, .c, .e, .f {
      width: 10px;
      height: 42px;
      clip-path: polygon(0 10%, 50% 0, 100% 10%, 100% 90%, 50% 100%, 0 90%);
    }

    .f { left: 6px; top: 12px; }
    .b { right: 6px; top: 12px; }
    .e { left: 6px; bottom: 12px; }
    .c { right: 6px; bottom: 12px; }

    .colon {
      width: 18px;
      height: 116px;
      position: relative;
      margin: 0 2px;
    }

    .colon::before,
    .colon::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--led-on);
      box-shadow:
        0 0 6px var(--led-glow),
        0 0 12px var(--led-glow),
        0 0 20px rgba(255, 43, 43, 0.3);
    }

    .colon::before {
      top: 34px;
    }

    .colon::after {
      bottom: 34px;
    }

    /* ===== Smaller date display ===== */
    .date-led {
      margin-top: 16px;
      padding: 10px 18px;
      min-width: 320px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      color: var(--led-on);
      font-family: "Consolas", "Courier New", monospace;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.03),
        0 0 8px rgba(255, 43, 43, 0.10);
      text-shadow:
        0 0 4px rgba(255, 43, 43, 0.65),
        0 0 10px rgba(255, 43, 43, 0.18);
      opacity: 0.95;
    }

    .clock-caption {
      text-align: center;
      margin-top: 14px;
      color: #a09da6;
      font-size: 14px;
    }

.sound-control {
  margin-top: 14px;
  padding: 7px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(255, 80, 80, 0.88);
  font-family: "Consolas", "Courier New", monospace;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 999px;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,0.03),
    0 0 8px rgba(255, 43, 43, 0.08);
}

.sound-label {
  user-select: none;
  text-shadow:
    0 0 4px rgba(255, 43, 43, 0.45),
    0 0 10px rgba(255, 43, 43, 0.12);
}
    
.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
  flex: 0 0 auto;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #2a1b1b;
  transition: 0.25s;
  border-radius: 999px;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.65),
    0 0 4px rgba(255, 43, 43, 0.08);
}

.slider::before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background-color: white;
  transition: transform 0.25s ease;
  border-radius: 50%;
  box-shadow: 0 2px 5px rgba(0,0,0,0.35);
}

.switch input:checked + .slider {
  background-color: #5a1717;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.55),
    0 0 8px rgba(255, 43, 43, 0.35),
    0 0 14px rgba(255, 43, 43, 0.18);
}

.switch input:checked + .slider::before {
  transform: translateX(22px);
}

    .next-meeting {
      margin-top: 24px;
      background: linear-gradient(180deg, #1d1d1d 0%, #111 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
      box-shadow: inset 0 -4px 10px rgba(0,0,0,0.35);
    }
    .nm-label {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      color: #a09da6;
      text-transform: uppercase;
    }
    .nm-date {
      color: var(--accent);
      font-weight: 700;
      margin-top: 7px;
      font-size: 1.05rem;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 30px;
      }

      .card {
        padding: 24px;
      }

      .digit {
        width: 48px;
        height: 88px;
      }

      .a, .d, .g {
        width: 28px;
        height: 8px;
        left: 10px;
      }

      .a { top: 5px; }
      .g { top: 40px; }
      .d { bottom: 5px; }

      .b, .c, .e, .f {
        width: 8px;
        height: 30px;
      }

      .f { left: 5px; top: 10px; }
      .b { right: 5px; top: 10px; }
      .e { left: 5px; bottom: 10px; }
      .c { right: 5px; bottom: 10px; }

      .colon {
        height: 88px;
      }

      .colon::before {
        top: 24px;
      }

      .colon::after {
        bottom: 24px;
      }

      .colon::before,
      .colon::after {
        width: 8px;
        height: 8px;
      }

      .date-led {
        min-width: 240px;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        padding: 8px 12px;
      }
    }
  </style>
  <script src="/nav.js" defer></script><script src="/meetings.js" defer></script>
</head>

  <script>
    const digitMap = {
      "0": ["a", "b", "c", "d", "e", "f"],
      "1": ["b", "c"],
      "2": ["a", "b", "d", "e", "g"],
      "3": ["a", "b", "c", "d", "g"],
      "4": ["b", "c", "f", "g"],
      "5": ["a", "c", "d", "f", "g"],
      "6": ["a", "c", "d", "e", "f", "g"],
      "7": ["a", "b", "c"],
      "8": ["a", "b", "c", "d", "e", "f", "g"],
      "9": ["a", "b", "c", "d", "f", "g"]
    };

    function setDigit(elementId, numberChar) {
      const digit = document.getElementById(elementId);
      const segments = digit.querySelectorAll(".segment");
      const activeSegments = digitMap[numberChar] || [];

      segments.forEach(segment => {
        const segmentClass = [...segment.classList].find(cls =>
          ["a", "b", "c", "d", "e", "f", "g"].includes(cls)
        );

        if (activeSegments.includes(segmentClass)) {
          segment.classList.add("on");
        } else {
          segment.classList.remove("on");
        }
      });
    }
    
    let audioContext = null;
    let tickEnabled = false;
    let lasttickSecond = null;
    
    function inittickToggle() {
      const tickToggle = document.getElementById("tickToggle");
      if (!tickToggle) return;
    
      tickToggle.addEventListener("change", async () => {
        tickEnabled = tickToggle.checked;
    
        if (tickEnabled && !audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    
        if (tickEnabled && audioContext && audioContext.state === "suspended") {
          await audioContext.resume();
        }
      });
    }
    
    function playSubtletick() {
      if (!tickEnabled || !audioContext) return;
    
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
    
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
    
      gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.035, audioContext.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.08);
    
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
    
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.09);
    }
    const TZ = (() => { try { return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Amsterdam"; } catch (e) { return "Europe/Amsterdam"; } })();
    document.getElementById("tzName").textContent = TZ.replace(/_/g, " ") + " time";
    const amsLine = document.getElementById("amsLine");
    const showAms = TZ !== "Europe/Amsterdam";
    if (showAms) amsLine.style.display = "block";
    const amsFmt = new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/Amsterdam", hour: "2-digit", minute: "2-digit", hour12: false });
    function updateClock() {
      if (showAms) amsLine.textContent = "Amsterdam: " + amsFmt.format(new Date());
      const now = new Date();

      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      const allDigits = (hh + mm + ss).split("");

      allDigits.forEach((digit, index) => {
        setDigit("digit" + index, digit);
      });

      const dateText = now.toLocaleDateString("en-GB", {
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).replace(/,/g, "").toUpperCase();

      document.getElementById("dateDisplay").textContent = dateText;
      const currentSecond = now.getSeconds();
      
      if (
        tickEnabled &&
        currentSecond % 10 === 0 &&
        lasttickSecond !== currentSecond
      ) {
        playSubtletick();
        lasttickSecond = currentSecond;
      }
      
      if (currentSecond % 10 !== 0) {
        lasttickSecond = null;
}
    }
    inittickToggle();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
